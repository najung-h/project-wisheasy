{% load static %}

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>역 정보 - 쉽길</title>
    <link rel="stylesheet" href="{% static "css/station_info.css" %}">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="page-header">
        <div class="page-title">역 정보</div>
        <a href="{% url "common:index" %}" class="home-btn" aria-label="메인으로 돌아가기">
            <i class="fas fa-home"></i>
        </a>
    </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Station Search -->
            <div class="search-section">
                <div class="search-container">
                    <input type="text" id="stationSearch" class="search-input" placeholder="역 이름을 입력하세요" autocomplete="off">
                    <div class="search-suggestions" id="searchSuggestions"></div>
                </div>
                <button class="search-btn" onclick="triggerStationSearch()">
                    <i class="fas fa-search"></i>
                    역 정보 검색
                </button>
            </div>

            <!-- Station Info (Hidden initially) -->
            <div class="station-info" id="stationInfo" style="display: none;">
                <!-- Station Header -->
                <div class="station-header">
                    <h2 id="stationName">강남역</h2>
                    <div class="station-lines" id="stationLines">
                        <span class="line-badge line-2">2호선</span>
                        <span class="line-badge line-bundang">분당선</span>
                    </div>
                </div>

                <!-- Info Tabs -->
                <div class="info-tabs">
                    <button class="tab-btn active" onclick="showTab('lines')">
                        <i class="fas fa-subway"></i>
                        호선 정보
                    </button>
                    <button class="tab-btn" onclick="showTab('facilities')">
                        <i class="fas fa-building"></i>
                        시설 정보
                    </button>
                    <button class="tab-btn" onclick="showTab('realtime')">
                        <i class="fas fa-clock"></i>
                        실시간 정보
                    </button>
                </div>

                <!-- Tab Content -->
                <div class="tab-content active" id="linesTab">
                    <div class="info-card">
                        <h3>운영 호선</h3>
                        <div class="line-info" id="lineInfo">
                            <div class="line-item">
                                <span class="line-badge line-2">2호선</span>
                                <span class="line-detail">신정네거리 ↔ 까치산</span>
                            </div>
                            <div class="line-item">
                                <span class="line-badge line-bundang">분당선</span>
                                <span class="line-detail">왕십리 ↔ 수원</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="facilitiesTab">
                    <div class="info-card">
                        <h3>편의시설</h3>
                        <div class="facility-list" id="facilityList">
                            <div class="facility-item">
                                <i class="fas fa-walking"></i>
                                <div class="facility-detail">
                                    <span class="facility-name">에스컬레이터</span>
                                    <span class="facility-location">1,2,3,4번 출구</span>
                                </div>
                            </div>
                            <div class="facility-item">
                                <i class="fas fa-wheelchair"></i>
                                <div class="facility-detail">
                                    <span class="facility-name">엘리베이터</span>
                                    <span class="facility-location">2,4번 출구</span>
                                </div>
                            </div>
                            <div class="facility-item">
                                <i class="fas fa-restroom"></i>
                                <div class="facility-detail">
                                    <span class="facility-name">화장실</span>
                                    <span class="facility-location">1,3번 출구 근처</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="realtimeTab">
                    <div class="info-card">
                        <h3>실시간 도착 정보</h3>
                        <div class="realtime-info" id="realtimeInfo">
                            <div class="train-info">
                                <span class="line-badge line-2">2호선</span>
                                <div class="train-detail">
                                    <span class="train-direction">신정네거리행</span>
                                    <span class="train-time">2분 후 도착</span>
                                </div>
                            </div>
                            <div class="train-info">
                                <span class="line-badge line-2">2호선</span>
                                <div class="train-detail">
                                    <span class="train-direction">까치산행</span>
                                    <span class="train-time">5분 후 도착</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- No Results -->
            <div class="no-results" id="noResults" style="display: none;">
                <div class="no-results-icon">
                    <i class="fas fa-search"></i>
                </div>
                <h3>검색 결과가 없습니다</h3>
                <p>다른 역 이름으로 검색해보세요.</p>
            </div>
        </main>
    </div>

    <script src="{% static "js/search-util.js" %}"></script>
    <script src="{% static "js/station_info.js" %}"></script>
</body>
</html>
