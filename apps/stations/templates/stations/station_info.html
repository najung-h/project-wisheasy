{% extends "base.html" %}
{% load static %}

{% block title %}역 정보 - 쉽길{% endblock title %}

{% block css %}
    <link rel="stylesheet" href="{% static "css/station_info.css" %}">
{% endblock css %}


{% block content %}
    <div class="app-container">
        <!-- Header -->
        <header class="page-header">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="page-title">역 정보</div>
            <a href="{% url "common:index" %}" class="home-btn" aria-label="메인으로 돌아가기">
                <i class="fas fa-home"></i>
            </a>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Station Search -->
            <div class="search-section">
                <div class="search-container">
                    <input type="text" id="stationSearch" class="search-input" placeholder="역 이름을 입력하세요" autocomplete="off">
                    <div class="search-suggestions" id="searchSuggestions"></div>
                </div>
                <button class="search-btn" onclick="triggerStationSearch()">
                    <i class="fas fa-search"></i>
                    역 정보 검색
                </button>
            </div>

            <!-- Station Info (Hidden initially) -->
            <div class="station-info" id="stationInfo" style="display: none;">
                <!-- Station Header -->
                <div class="station-header">
                    <h2 id="stationName">강남역</h2>
                    <div class="station-lines" id="stationLines">
                        <!-- 호선 정보가 여기에 표시됩니다 (예: 2호선, 신분당선) -->
                    </div>
                </div>

                <!-- Facilities Section -->
                <div class="info-card">
                    <h3>편의시설</h3>
                    <div class="facility-list" id="facilityList">
                        <!-- 편의시설 목록이 여기에 표시됩니다 -->
                    </div>
                </div>
            </div>

            <!-- No Results -->
            <div class="no-results" id="noResults" style="display: none;">
                <div class="no-results-icon">
                    <i class="fas fa-search"></i>
                </div>
                <h3>검색 결과가 없습니다</h3>
                <p>다른 역 이름으로 검색해보세요.</p>
            </div>
        </main>
    </div>
{% endblock content %}


{% block js %}
    <script src="{% static "js/search-util.js" %}"></script>
    <script src="{% static "js/station_info.js" %}"></script>
{% endblock js %}
