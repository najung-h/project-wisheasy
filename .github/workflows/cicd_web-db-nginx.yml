name: Full CI/CD - Lint, Build, Push, and Deploy (Nginx + Django + MySQL)

# --------------- triggers ---------------------------------------------

on:
  push:
    branches:
      - dev          # ← 필요한 브랜치로 교체 가능 (예: main)
  pull_request:
    branches:
      - dev          # ← PR에서도 린트/빌드가 돌도록 명시
# --------------- /triggers ---------------------------------------------


jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # --------------- checkout ----------------------------------------
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
      # ---------------/checkout ----------------------------------------

      #-------------Lint:Ruff-------------
      # (임시 주석처리 - 추후 ci.yml / cd.yml 분리 시 복구)
      # # Python 3.11 (ruff 등 도구 실행용)
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.11"
      #     cache: "pip"

      # # Ruff 설치
      # - name: Install Ruff
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install ruff

      # # Ruff: check-only 모드 (자동수정/푸시 없음 → 루프 방지)
      # #  - 위반사항이 있으면 non-zero로 실패 처리
      # - name: Run Ruff (check-only; no auto-fix)
      #   if: ${{ github.actor != 'github-actions[bot]' }}   # 루프 방지 추가 안전장치
      #   run: |
      #     ruff check --diff .
      #     ruff format --check .
      #-------------/Lint:Ruff-------------


      #-------------Build-------------

      #-------------Build:buildx-------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      #-------------/Build:buildx-------------



      #-------------Build:registry-login-------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      #-------------/Build:registry-login-------------
          
        
      #-------------Build:build_n_push-------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wisheasy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wisheasy:sha-${{ github.sha }}
          
      #-------------/Build:build_n_push-------------
  #-------------/Build-------------

  #-------------Deploy-------------
  deploy:
    needs: build-and-push
    # PR에서는 배포를 스킵하고, push(dev)일 때만 배포하려면 아래 if 추가
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 with Docker Compose (nginx + web + db)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # -----------deploy:prep---------
            # -p 명령어(폴더가 없으면 만들고, 있어도 실패 안함)를 통해, 다음 단계에서 필요한 폴더 구조가 확실하게 존재하도록 보장
            APP_DIR="/home/ubuntu/app"
            mkdir -p "$APP_DIR/nginx/conf.d"
            cd "$APP_DIR"
            # ----------/deploy:prep---------

            # -----------deploy:env---------
            # .env 파일 재생성, -f 명령어를 통해 파일 존재여부와 관계없이 삭제를 (안전하게 == 실패 안하게)보장하려고 함.
            rm -f .env
            # 아래 명령어를 통해 스크립트 내에서 환경 변수와 같은 여러 줄의 데이터를 파일(.env)로 만들 수 있음 
            cat > .env << 'EOF'
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}

            DB_HOST=db
            DB_NAME=${{ secrets.MYSQL_DATABASE }}
            DB_USER=${{ secrets.MYSQL_USER }}
            DB_PASS=${{ secrets.MYSQL_PASSWORD }}
            DB_PORT=3306

            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DJANGO_DEBUG=True
            DJANGO_ALLOWED_HOSTS=*

            DOCKERHUB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/wisheasy
            IMAGE_TAG=sha-${{ github.sha }}

            COMPOSE_FILE=docker-compose.yml
            WEB_SVC=wisheasy_web
            DB_SVC=mysql_db
            NGINX_SVC=nginx_edge

            EOF
            COMPOSE_FILE=docker-compose.yml
            WEB_SVC=wisheasy_web
            DB_SVC=mysql_db
            NGINX_SVC=nginx_edge
            # ----------/deploy:env---------

            # -----------deploy:docker-ensure---------
            # Docker/Compose 보장
            # 1) Docker CE 설치 여부 확인, 없으면 설치
            # 2) Docker 서비스 활성화
            # 3) docker compose 설치 여부 확인, 없으면 설치

            # Docker 설치 여부 확인
            if ! command -v docker >/dev/null 2>&1; then
              echo "[deploy:docker-ensure] Docker CE 설치되어 있지 않습니다. 설치하겠습니다..."
              # Docker CE 설치 없을 때 설치 - 기존에 수동으로 하는 법을 정리해놨는데, 그것을 CI-CD로도 자동화하겠습니다. 아래 코드가 궁금하다면 정현쓰 티스토리 참고하세요
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg lsb-release

              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
                sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg

              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu \
                $(lsb_release -cs) stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

              sudo apt-get update
              # - docker-ce: 도커 엔진
              # - docker-ce-cli: 도커 CLI
              # - containerd.io: 컨테이너 런타임
              # - docker-buildx-plugin: Buildx 플러그인
              # - docker-compose-plugin: Compose v2 플러그인
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            else
              # 이미 설치되어 있음을 알리는 메시지
              echo "[deploy:docker-ensure] Docker CE 설치되어 있습니다."
            fi

            # 도커 서비스가 부팅 시 자동으로 시작되도록 설정하고 즉시 시작하게
            sudo systemctl enable --now docker
            sudo docker version || (echo "[deploy:docker-ensure] Docker 데몬이 실행 중이 아닙니다" && exit 1)

            # docker compose를 사용해서 배포할 예정이기 때문에, docker-compose 설치 확인
            if ! sudo docker compose version >/dev/null 2>&1; then
              echo "[deploy:docker-ensure] docker-compose 플러그인 설치하겠습니다..."
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            else
              echo "[deploy:docker-ensure] docker compose 사용 가능합니다. 설치 진행하지 않겠습니다."
            fi

            # Hub 로그인
            if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            fi

            # 네트워크 생성 - 야멜 파일 안에 정의된 컨테이너 들이 appnet에 연결되어, 서로 다른 컨테이너 들이 통신할 수 있게 만들어줍니다. 반대로 appnet 네트워크에 속하지 않은 다른 컨테이너들과는 격리되어 보안은 강화됩니다.
            sudo docker network create appnet || true
            # ----------/deploy:docker-ensure---------

            # -----------deploy:nginx-conf---------
            # nginx conf (HTTP→HTTPS 리다이렉트 + 프록시) 
            # 목적: 80 포트는 443으로 리다이렉트 강제, 443은 web:8000으로 프록시
            # 즉, 80(hhtp), 443(https)로 사용자의 요청이 오면, nginx컨테이너로 전달하고, 이후 들어온 요청을 실제 웹앱이 있는 컨테이너로 전달한다.
            # Nginx 가 읽을 서버 설정 파일을 nginx/conf.d/default.conf 경로에 생성
            cat > nginx/conf.d/default.conf << 'EOF'
            server {
              listen 80;
              server_name wisheasy.site;
              return 301 https://$host$request_uri;
            }

            server {
              listen 443 ssl http2;
              server_name wisheasy.site;

              ssl_certificate /etc/letsencrypt/live/wisheasy.site/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/wisheasy.site/privkey.pem;

              ssl_session_timeout 1d;
              ssl_session_cache shared:MozSSL:10m;
              ssl_session_tickets off;
              ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

              add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

              location /static/ {
                alias /app/staticfiles/;
                try_files $uri $uri/ =404;
              }

              location / {
                proxy_pass http://web:8000;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
            }
            EOF
            # ----------/deploy:nginx-conf---------

            # -----------deploy:compose-file---------
            # 개발 과정임을 고려하여 docker-compose.yml 작성, 추후 운영환경을 위해 docker-compose.prod.yml 별도 작성 예정.
            cat > docker-compose.yml << 'EOF'
            services:
              db:
                image: mysql:8
                container_name: mysql_db
                restart: always
                env_file: .env
                environment:
                  MYSQL_DATABASE: ${MYSQL_DATABASE}
                  MYSQL_USER: ${MYSQL_USER}
                  MYSQL_PASSWORD: ${MYSQL_PASSWORD}
                  MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                volumes:
                  - mysql_data:/var/lib/mysql
                  - ./mysql/conf.d:/etc/mysql/conf.d:ro 
                networks: [appnet]
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
                  interval: 5s
                  timeout: 3s
                  retries: 30

              web:
                image: "${DOCKERHUB_IMAGE}:${IMAGE_TAG}"
                container_name: wisheasy_web
                restart: always
                env_file: .env
                environment:
                  SECRET_KEY: ${DJANGO_SECRET_KEY}
                  DJANGO_DEBUG: ${DJANGO_DEBUG}
                  MYSQL_HOST: ${DB_HOST:-db}
                  MYSQL_PORT: ${DB_PORT:-3306}
                  MYSQL_DATABASE: ${MYSQL_DATABASE}
                  MYSQL_USER: ${MYSQL_USER}
                  MYSQL_PASSWORD: ${MYSQL_PASSWORD}
                  MYSQL_DB: ${MYSQL_DATABASE}
                volumes:
                  - ./staticfiles:/app/staticfiles
                networks: [appnet]
                expose:
                  - "8000"
                depends_on:
                  db:
                    condition: service_healthy
                command: >
                  sh -lc "
                  python manage.py migrate --noinput &&
                  python manage.py collectstatic --noinput &&
                  gunicorn config.wsgi:application --bind 0.0.0.0:8000
                  "

              nginx:
                image: nginx:1.27-alpine
                container_name: nginx_edge
                restart: always
                depends_on:
                  - web
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./nginx/conf.d:/etc/nginx/conf.d:ro
                  - /etc/letsencrypt:/etc/letsencrypt:ro
                  - ./staticfiles:/app/staticfiles:ro
                networks: [appnet]

            networks:
              appnet:
                external: true

            volumes:
              mysql_data:
            EOF
            # ----------/deploy:compose-file---------

            # -----------deploy:compose-up---------
            # 최신 이미지 pull & 컨테이너 기동
            sudo docker compose -f docker-compose.yml pull
            sudo docker compose -f docker-compose.yml up -d
            sudo docker compose ps
            # ----------/deploy:compose-up---------

            # -----------deploy:db-wait-and-init---------
            # [로그] 현재 단계가 DB 대기 및 초기화임을 알림
            echo "[deploy:db-wait-and-init] MySQL이 준비될 때까지 대기 중입니다."

            # 최대 60회(= 약 120초)까지 MySQL이 준비될 때까지 반복 대기
            for i in {1..60}; do
              # DB 컨테이너 내부에서 mysqladmin ping 실행하여 서버가 응답 가능한지 확인
              # - docker exec $DB_SVC: $DB_SVC(예: mysql_db) 컨테이너 안으로 들어가 명령 실행
              # - sh -lc '...': 로그인 쉘(-l) + 문자열 전체를 하나의 커맨드로 실행(-c)
              # - mysqladmin ping: MySQL 데몬이 살아있고 접속 가능한지 확인하는 유틸
              # - --silent: 준비가 안 되면 아무 것도 출력하지 않음(반환코드로 판단)
              if sudo docker exec "$DB_SVC" sh -lc 'mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD" --silent'; then
                echo "[deploy(db:wait-and-init)] MySQL 준비 완료"; break
              fi
              echo "[deploy(db:wait-and-init)] MySQL 대기 중... ($i)"
              sleep 2
            done  

            # [로그] 데이터베이스/사용자 보장 단계 안내
            echo "[deploy(db:wait-and-init)] 데이터베이스와 사용자 존재 여부 확인합니다."

            # DB 컨테이너 내부에서 mysql 클라이언트로 SQL을 실행하여
            # 1) 데이터베이스가 없으면 생성
            # 2) 유저가 없으면 생성
            # 3) 권한 부여 및 적용
            sudo docker exec $DB_SVC sh -lc '
              mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e "
                /* 데이터베이스가 없으면 생성 (멱등 보장) */
                CREATE DATABASE IF NOT EXISTS ${MYSQL_DATABASE:-${MYSQL_DB}}
                  DEFAULT CHARACTER SET utf8mb4
                  COLLATE utf8mb4_unicode_ci;

                /* 애플리케이션 접속용 계정을 없으면 생성 (멱등 보장)
                  '\'' ... '\'' 는 SQL 문자열 내에서 작은따옴표를 이스케이프하기 위한 표기 */
                CREATE USER IF NOT EXISTS '\''${MYSQL_USER}'\''@'\'%\'' 
                  IDENTIFIED BY '\''${MYSQL_PASSWORD}'\'';

                /* 해당 DB에 대한 모든 권한 부여 (개발/테스트 편의 목적)*/
                GRANT ALL PRIVILEGES ON ${MYSQL_DATABASE:-${MYSQL_DB}}.* TO '\''${MYSQL_USER}'\''@'\'%\''; 

                /* 권한 변경사항 즉시 반영 */
                FLUSH PRIVILEGES;
              "
            '
            # -----------/deploy:db-wait-and-init---------

            # -----------deploy:migrate-and-static---------
            # 배포 단계 중 migrate와 collectstatic 작업이 수행되는 부분
            echo "[deploy:migrate-and-static] Django migrate과 collectstatic 수행하겠습니다."
            # 도커 컨테이너 안에서, 실행 대상인 컨테이너 이름에 대해서, 환경 변수 로드해서 뒤의 문자열을 명령으로 실행하라.
            # -  Django의 마이그레이션 적용하여 DB  스키마를 현재 모델 정의와 동기화하자.
            # -  noinput 옵션은 실행 중 사용자 입력을 요구하지 않고 자동으로 진행한다.
            # -  &&  는 migrate가 성공해야 collectstatic 실행하겠다는 의미
            # -  모든 앱의 정적 파일을 static_root의 디렉토리로 복사하며
            # -  운영환경에서 nginx 가 정적 파일을 제공할 수 있도록 준비한다.
            # -  ---noinput 옵션으로 파일 덮어쓰기 여부 등 질문에 자동으로 yes를 응답하게 된다.
            sudo docker exec $WEB_SVC bash -lc "
              python manage.py migrate --noinput &&
              python manage.py collectstatic --noinput
            "
            # -----------/deploy:migrate-and-static---------


  #-------------/Deploy-------------