name: Full CI/CD - Lint, Build, Push, and Deploy (Nginx + Django + MySQL)

# --------------- triggers ---------------------------------------------

on:
  push:
    branches:
      - dev          # ← 필요한 브랜치로 교체 가능 (예: main)
  pull_request:
    branches:
      - dev          # ← PR에서도 린트/빌드가 돌도록 명시
# --------------- /triggers ---------------------------------------------


jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # --------------- checkout ----------------------------------------
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
      # ---------------/checkout ----------------------------------------

      #-------------Lint:Ruff-------------
      # (임시 주석처리 - 추후 ci.yml / cd.yml 분리 시 복구)
      # # Python 3.11 (ruff 등 도구 실행용)
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.11"
      #     cache: "pip"

      # # Ruff 설치
      # - name: Install Ruff
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install ruff

      # # Ruff: check-only 모드 (자동수정/푸시 없음 → 루프 방지)
      # #  - 위반사항이 있으면 non-zero로 실패 처리
      # - name: Run Ruff (check-only; no auto-fix)
      #   if: ${{ github.actor != 'github-actions[bot]' }}   # 루프 방지 추가 안전장치
      #   run: |
      #     ruff check --diff .
      #     ruff format --check .
      #-------------/Lint:Ruff-------------


      #-------------Build-------------

      #-------------Build:buildx-------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      #-------------/Build:buildx-------------



      #-------------Build:registry-login-------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      #-------------/Build:registry-login-------------
          
        
      #-------------Build:build_n_push-------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wisheasy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wisheasy:sha-${{ github.sha }}
          
      #-------------/Build:build_n_push-------------
  #-------------/Build-------------

  #-------------Deploy-------------
  deploy:
    needs: build-and-push
    # PR에서는 배포를 스킵하고, push(dev)일 때만 배포하려면 아래 if 추가
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 with Docker Compose (nginx + web + db)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -Eeuo pipefail

            # -----------deploy:prep---------
            # -p 명령어(폴더가 없으면 만들고, 있어도 실패 안함)를 통해, 다음 단계에서 필요한 폴더 구조가 확실하게 존재하도록 보장
            APP_DIR="/home/ubuntu/app"
            mkdir -p "$APP_DIR/nginx/conf.d"
            cd "$APP_DIR"
            # ----------/deploy:prep---------

            # -----------deploy:env---------
            # .env 파일 재생성, -f 명령어를 통해 파일 존재여부와 관계없이 삭제를 (안전하게 == 실패 안하게)보장하려고 함.
            rm -f .env
            # 아래 명령어를 통해 스크립트 내에서 환경 변수와 같은 여러 줄의 데이터를 파일(.env)로 만들 수 있음 
            cat > .env << 'EOF'
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}

            DB_HOST=mysql_db
            DB_NAME=${{ secrets.MYSQL_DATABASE }}
            DB_USER=${{ secrets.MYSQL_USER }}
            DB_PASS=${{ secrets.MYSQL_PASSWORD }}
            DB_PORT=3306

            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DJANGO_DEBUG=True
            DJANGO_ALLOWED_HOSTS=*

            DJANGO_EC2_HOSTS=${{ secrets.DJANGO_EC2_HOSTS }}
            
            DOCKERHUB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/wisheasy
            IMAGE_TAG=sha-${{ github.sha }}
            
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}

            SITE_DOMAIN=wisheasy.site

            EOF
            COMPOSE_FILE=docker-compose.yml
            WEB_SVC=wisheasy_web
            DB_SVC=mysql_db
            NGINX_SVC=nginx_edge
            UWV=default
            
            # ----------/deploy:env---------

            # -----------deploy:mysql-conf---------
            # MySQL 설정파일 초기화 및 재생성
            # (기존 파일이 있더라도 강제로 삭제 후 새로 작성)
            sudo mkdir -p ./mysql/conf.d
            sudo rm -f ./mysql/conf.d/my.cnf

            cat > ./mysql/conf.d/my.cnf << 'EOF'
            [mysqld]
            innodb_buffer_pool_size=64M
            max_connections=50
            tmp_table_size=16M
            table_open_cache=200
            sort_buffer_size=1M
            read_buffer_size=1M
            read_rnd_buffer_size=1M
            join_buffer_size=1M
            EOF
            # -----------/deploy:mysql-conf---------


            # -----------deploy:docker-ensure---------
            # Docker/Compose 보장
            # 1) Docker CE 설치 여부 확인, 없으면 설치
            # 2) Docker 서비스 활성화
            # 3) docker compose 설치 여부 확인, 없으면 설치

            # Docker 설치 여부 확인
            if ! command -v docker >/dev/null 2>&1; then
              echo "[deploy:docker-ensure] Docker CE 설치되어 있지 않습니다. 설치하겠습니다..."
              # Docker CE 설치 없을 때 설치 - 기존에 수동으로 하는 법을 정리해놨는데, 그것을 CI-CD로도 자동화하겠습니다. 아래 코드가 궁금하다면 정현쓰 티스토리 참고하세요
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg lsb-release

              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
                sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg

              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu \
                $(lsb_release -cs) stable" | \
                sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

              sudo apt-get update
              # - docker-ce: 도커 엔진
              # - docker-ce-cli: 도커 CLI
              # - containerd.io: 컨테이너 런타임
              # - docker-buildx-plugin: Buildx 플러그인
              # - docker-compose-plugin: Compose v2 플러그인
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            else
              # 이미 설치되어 있음을 알리는 메시지
              echo "[deploy:docker-ensure] Docker CE 설치되어 있습니다."
            fi

            # 도커 서비스가 부팅 시 자동으로 시작되도록 설정하고 즉시 시작하게
            sudo systemctl enable --now docker
            sudo docker version || (echo "[deploy:docker-ensure] Docker 데몬이 실행 중이 아닙니다" && exit 1)

            # docker compose를 사용해서 배포할 예정이기 때문에, docker-compose 설치 확인
            if ! sudo docker compose version >/dev/null 2>&1; then
              echo "[deploy:docker-ensure] docker-compose 플러그인 설치하겠습니다..."
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            else
              echo "[deploy:docker-ensure] docker compose 사용 가능합니다. 설치 진행하지 않겠습니다."
            fi

            # Hub 로그인
            if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            fi

            # 네트워크 생성 - 야멜 파일 안에 정의된 컨테이너 들이 appnet에 연결되어, 서로 다른 컨테이너 들이 통신할 수 있게 만들어줍니다. 반대로 appnet 네트워크에 속하지 않은 다른 컨테이너들과는 격리되어 보안은 강화됩니다.
            sudo docker network create appnet || true
            # ----------/deploy:docker-ensure---------

            # -----------deploy:nginx-conf---------
            # nginx conf (HTTP→HTTPS 리다이렉트 + 프록시) 
            # 목적: 80 포트는 443으로 리다이렉트 강제, 443은 web:8000으로 프록시
            # 즉, 80(hhtp), 443(https)로 사용자의 요청이 오면, nginx컨테이너로 전달하고, 이후 들어온 요청을 실제 웹앱이 있는 컨테이너로 전달한다.
            # Nginx 가 읽을 서버 설정 파일을 nginx/conf.d/default.conf 경로에 생성
            cat > nginx/conf.d/default.conf << 'EOF'
            server {
              listen 80;
              server_name wisheasy.site;
              return 301 https://$host$request_uri;
            }

            server {
              listen 443 ssl http2;
              server_name wisheasy.site;

              ssl_certificate /etc/letsencrypt/live/wisheasy.site/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/wisheasy.site/privkey.pem;

              ssl_session_timeout 1d;
              ssl_session_cache shared:MozSSL:10m;
              ssl_session_tickets off;
              ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

              add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

              location /static/ {
                alias /app/staticfiles/;
                try_files $uri $uri/ =404;
              }

              location / {
                proxy_pass http://web:8000;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
            }
            EOF
            # ----------/deploy:nginx-conf---------

            # -----------deploy:compose-file---------
            # 개발 과정임을 고려하여 docker-compose.yml 작성, 추후 운영환경을 위해 docker-compose.prod.yml 별도 작성 예정.
            cat > docker-compose.yml << 'EOF'
            services:
              db:
                image: mysql:8.0
                container_name: mysql_db
                restart: always
                env_file: .env
                environment:
                  MYSQL_DATABASE: ${MYSQL_DATABASE}
                  MYSQL_USER: ${MYSQL_USER}
                  MYSQL_PASSWORD: ${MYSQL_PASSWORD}
                  MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                volumes:
                  - mysql_data:/var/lib/mysql
                  - ./mysql/conf.d:/etc/mysql/conf.d:ro 
                networks: [appnet]
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
                  interval: 5s
                  timeout: 5s
                  retries: 90

              web:
                image: "${DOCKERHUB_IMAGE}:${IMAGE_TAG}"
                container_name: wisheasy_web
                restart: always
                env_file: .env
                environment:
                  SECRET_KEY: ${DJANGO_SECRET_KEY}
                  DJANGO_DEBUG: ${DJANGO_DEBUG}
                  MYSQL_HOST: ${DB_HOST:-db}
                  MYSQL_PORT: ${DB_PORT:-3306}
                  MYSQL_DATABASE: ${MYSQL_DATABASE}
                  MYSQL_USER: ${MYSQL_USER}
                  MYSQL_PASSWORD: ${MYSQL_PASSWORD}
                  MYSQL_DB: ${MYSQL_DATABASE}
                  DJANGO_SETTINGS_MODULE: config.settings.prod
                  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
                  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
                  SITE_DOMAIN: ${SITE_DOMAIN}
                volumes:
                  - ./staticfiles:/app/staticfiles
                  - ./logs:/app/logs
                  - app_data:/data
                
                networks: [appnet]
                expose:
                  - "8000"
                depends_on:
                  db:
                    condition: service_healthy
                command: >
                  sh -lc "
                  gunicorn config.wsgi:application
                  --bind 0.0.0.0:8000
                  --access-logfile /app/logs/gunicorn_access.log
                  --error-logfile /app/logs/gunicorn_error.log
                  --log-level debug
                  "

              nginx:
                image: nginx:1.27-alpine
                container_name: nginx_edge
                restart: always
                depends_on:
                  - web
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./nginx/conf.d:/etc/nginx/conf.d:ro
                  - /etc/letsencrypt:/etc/letsencrypt:ro
                  - ./staticfiles:/app/staticfiles:ro
                networks: [appnet]

            networks:
              appnet:
                external: true

            volumes:
              mysql_data:
              app_data:
            EOF
            # ----------/deploy:compose-file---------

            # -----------deploy:compose-up---------
            # 최신 이미지 pull & 컨테이너 기동
            sudo docker compose -f "$COMPOSE_FILE" pull
            # DB만 먼저
            sudo docker compose -f "$COMPOSE_FILE" up -d db
            sudo docker compose -f "$COMPOSE_FILE" ps
            # ----------/deploy:compose-up---------

            # -----------deploy:db-wait-and-init---------
            # [로그] 현재 단계가 DB 대기 및 초기화임을 알림
            echo "[deploy:db-wait-and-init] MySQL이 준비될 때까지 대기 중입니다."

            # 최대 60회(= 약 120초)까지 MySQL이 준비될 때까지 반복 대기
            for i in {1..60}; do
              # DB 컨테이너 내부에서 mysqladmin ping 실행하여 서버가 응답 가능한지 확인
              # - docker exec $DB_SVC: $DB_SVC(예: mysql_db) 컨테이너 안으로 들어가 명령 실행
              # - sh -lc '...': 로그인 쉘(-l) + 문자열 전체를 하나의 커맨드로 실행(-c)
              # - mysqladmin ping: MySQL 데몬이 살아있고 접속 가능한지 확인하는 유틸
              # - --silent: 준비가 안 되면 아무 것도 출력하지 않음(반환코드로 판단)
              if sudo docker exec "$DB_SVC" sh -lc 'mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD" --silent'; then
                echo "[deploy(db:wait-and-init)] MySQL 준비 완료"; break
              fi
              echo "[deploy(db:wait-and-init)] MySQL 대기 중... ($i)"
              sleep 2
            done  

            # [로그] 데이터베이스/사용자 보장 단계 안내
            echo "[deploy(db:wait-and-init)] 데이터베이스와 사용자 존재 여부 확인합니다."

            # DB 컨테이너 내부에서 mysql 클라이언트로 SQL을 실행하여
            # 1) 데이터베이스가 없으면 생성
            # 2) 유저가 없으면 생성
            # 3) 권한 부여 및 적용
            sudo docker exec $DB_SVC sh -lc '
              mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e "
                /* 데이터베이스가 없으면 생성 (멱등 보장) */
                CREATE DATABASE IF NOT EXISTS ${MYSQL_DATABASE:-${MYSQL_DB}}
                  DEFAULT CHARACTER SET utf8mb4
                  COLLATE utf8mb4_unicode_ci;

                /* 애플리케이션 접속용 계정을 없으면 생성 (멱등 보장)
                  '\'' ... '\'' 는 SQL 문자열 내에서 작은따옴표를 이스케이프하기 위한 표기 */
                CREATE USER IF NOT EXISTS '\''${MYSQL_USER}'\''@'\'%\'' 
                  IDENTIFIED BY '\''${MYSQL_PASSWORD}'\'';

                /* 해당 DB에 대한 모든 권한 부여 (개발/테스트 편의 목적)*/
                GRANT ALL PRIVILEGES ON ${MYSQL_DATABASE:-${MYSQL_DB}}.* TO '\''${MYSQL_USER}'\''@'\'%\''; 

                /* 권한 변경사항 즉시 반영 */
                FLUSH PRIVILEGES;
              "
            '
            # -----------/deploy:db-wait-and-init---------

            # -----------deploy:migrate-and-static---------
            # 배포 단계 중 migrate와 collectstatic 작업이 수행되는 부분
            # 목적: Django 프로젝트의 데이터베이스 스키마를 최신 상태로 동기화하고,
            #       정적 파일을 모아 Nginx가 서비스할 수 있도록 준비하는 단계입니다.
            #       (== 웹앱이 실제로 뜨기 전에 내부 구조와 자산을 세팅하는 작업)
            echo "[deploy:migrate-and-static] Django migrate과 collectstatic 수행하겠습니다."
            # ? 왜 웹앱(Gunicorn)이 뜨기 전에 migrate를 하나요?
            #  └ manage.py migrate 명령은 웹 서버(gunicorn) 실행과 무관하게, 
            #    Django ORM을 통해 직접 DB에 접속하여 스키마를 적용
            #  └ 즉, DB만 살아있으면 (웹앱이 뜨기 전이라도) 독립적으로 실행 가능
            #  └ 이렇게 하면 웹 서버가 DB 미준비 상태에서 오류로 죽는 상황을 예방할 수 있음
            # 도커 컨테이너 안에서, 실행 대상인 컨테이너 이름에 대해서, 환경 변수 로드해서 뒤의 문자열을 명령으로 실행하라.
            # -  Django의 마이그레이션 적용하여 DB  스키마를 현재 모델 정의와 동기화하자.
            # -  noinput 옵션은 실행 중 사용자 입력을 요구하지 않고 자동으로 진행한다.
            # -  &&  는 migrate가 성공해야 collectstatic 실행하겠다는 의미
            # -  모든 앱의 정적 파일을 static_root의 디렉토리로 복사하며
            # -  운영환경에서 nginx 가 정적 파일을 제공할 수 있도록 준비한다.
            # -  ---noinput 옵션으로 파일 덮어쓰기 여부 등 질문에 자동으로 yes를 응답하게 된다.
            # sudo docker exec $WEB_SVC bash -lc "
            # 기존 명령어는 웹 컨테이너가 이미 떠 있어야 동작하는데
            # 우리는 웹이 뜨기 전에 migrate/collectstatic을 하려는 거기 때문에
            # 실행 중 컨테이너에 붙는 exec 가 아니라, 일회성 컨테이너를 띄우는 run --rm 을 써야한다.
            # 요약
            # 1. 웹 컨테이너가 아직 안 떠 있어도 실행 가능 (이미지 기반으로 일회성 컨테이너 생성)
            # 2. 실행이 끝나면 컨테이너 자동 제거 -> 환경 깨끗함
            # 3. 웹 서버 메모리/상태에 영향 없이 마이그레이션 작업만 수행
            
            # (1) DB 마이그레이션: 이미 만들어진 테이블이 있어도 기록만 맞추도록 안전장치 포함
            sudo docker compose -f "$COMPOSE_FILE" run --rm web sh -lc "
              echo '[deploy:migrate] (1/4) DB 마이그레이션 시작...';
              python manage.py migrate --noinput --settings=config.settings.prod || \
              python manage.py migrate --fake-initial --noinput --settings=config.settings.prod;
              echo '[deploy:migrate] (1/4 DB 마이그레이션 완료';
            "

            # (2) Google SocialApp 적용
            sudo docker compose -f "$COMPOSE_FILE" run --rm web sh -lc "
              set -Eeuo pipefail
              echo '[deploy:apply-socialapp] (2/4) Django Site 도메인 업데이트...';
              python manage.py shell --settings=config.settings.prod -c \
              'from django.contrib.sites.models import Site; s,_=Site.objects.get_or_create(id=1); s.domain=\"wisheasy.site\"; s.name=\"wisheasy.site\"; s.save(); print(s.id, s.domain)'

              echo '[deploy:apply-socialapp] (2/4) Google SocialApp 적용 시작...';
              python manage.py apply_socialapp --settings=config.settings.prod;
              echo '[deploy:apply-socialapp] (2/4) Google SocialApp 적용 완료';
            "

            # (3) CSV 파일 DB에 업로드
            # 최초  1회 / 내용 변경 시에만 실행 예정
            sudo docker compose -f "$COMPOSE_FILE" run --rm web sh -lc "
              set -Eeuo pipefail
              echo '[deploy:load_csv] (3/4) CSV 데이터 적재 시작...';
              mkdir -p /data && touch /data/.keep

              if [ -f /data/.csv_loaded ]; then
                echo '[deploy:load_csv] (3/4) 이미 적재 완료됨. 스킵합니다.';
                exit 0
              fi
              python manage.py load_csv --file line2_7_edges.csv --settings=config.settings.prod
              python manage.py load_csv --file line2_7_nodes.csv --settings=config.settings.prod
              python manage.py load_csv --file line2_7_lines.csv --settings=config.settings.prod
              touch /data/.csv_loaded
              echo '[deploy:load_csv] (3/4) CSV 데이터 적재 완료';
            "

            # (4) 정적 파일 수집
            sudo docker compose -f "$COMPOSE_FILE" run --rm web sh -lc "
              echo '[deploy:migrate-and-static] (3/4) 정적 파일 수집 시작...';
              python manage.py collectstatic --noinput --settings=config.settings.prod;
              echo '[deploy:migrate-and-static] (3/4) 정적 파일 수집 완료';
            "

            echo "[deploy:migrate-and-static] 완료되었습니다."
            # -----------/deploy:migrate-and-static---------

            # -----------deploy:start web & nginx---------
            sudo docker compose -f "$COMPOSE_FILE" up -d web nginx
            sudo docker compose -f "$COMPOSE_FILE" ps
            echo "[deploy:done] 배포 완료"
            # ----------/deploy:start---------



  #-------------/Deploy-------------


  #-------------Cleanup-------------
  cleanup:
    # 배포 완료 후 실행
    needs: deploy          
    # push 이벤트에서만 실행
    if: ${{ github.event_name == 'push' }}  
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old Docker images on EC2 (retain last 3)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -Eeuo pipefail
            echo "[cleanup] 오래된 Docker 이미지를 정리합니다."
            REPO="${{ secrets.DOCKERHUB_USERNAME }}/wisheasy"
            KEEP_N=3


            # 1) 현재 실행 중인 이미지 확인
            # - docker ps -a: 실행 중이거나 종료된 모든 컨테이너 리스트 출력
            # - --format '{{.Image}}': 컨테이너가 어떤 이미지를 사용하는지 표시
            # - sort -u: 중복 제거
            # - mapfile -t: bash 배열(IN_USE[])로 저장 (각 요소가 한 이미지 이름)
            echo "[cleanup] 1. 실행 중인 컨테이너 이미지를 수집합니다."
            mapfile -t IN_USE <<< "$(sudo docker ps -a --format '{{.Image}}' | sort -u)"

            # 2) 레포에서 최근 생성된 sha 이미지 N개를 추려서 보존 리스트에 추가
            # - docker images --format: 이미지 이름(tag) + 생성일을 한 줄로 출력
            # - awk -v r="$REPO": wisheasy 레포 내 sha-태그만 필터링
            # - sort -rk2: 생성일 기준 내림차순 정렬 (가장 최근 것이 위로)
            # - head -n "$KEEP_N": 최근 N개만 남기기
            # - awk '{print $1}': 이미지 이름만 추출 → KEEP_SHA[] 배열에 저장
            echo "[cleanup] 2. 최근 ${KEEP_N}개의 sha 이미지를 보호 대상에 추가합니다."
            mapfile -t KEEP_SHA <<< "$(
              sudo docker images --format '{{.Repository}}:{{.Tag}} {{.CreatedAt}}' \
              | awk -v r="$REPO" '$1 ~ r":sha-" {print $1, $2" "$3" "$4" "$5" "$6}' \
              | sort -rk2 \
              | head -n "$KEEP_N" \
              | awk '{print $1}'
            )"

            # 3) wisheasy 레포의 모든 sha-이미지 목록을 가져옴
            # ALL_SHA[] = wisheasy 레포에 존재하는 모든 sha 이미지 태그 목록
            mapfile -t ALL_SHA <<< "$(
              sudo docker images --format '{{.Repository}}:{{.Tag}}' \
              | awk -v r="$REPO" '$1 ~ r":sha-" {print $1}'
            )"

            # 4) atest 이미지가 있으면 보호 리스트에 추가
            PROTECT_LIST=("${KEEP_SHA[@]}")
            if sudo docker images --format '{{.Repository}}:{{.Tag}}' | grep -q "^${REPO}:latest$"; then
              PROTECT_LIST+=("${REPO}:latest")
            fi

            # 5) 삭제할 후보 찾기
            # -1- 보호 리스트에 있으면 스킵
            # -2- 현재 실행 중인 컨테이너가 사용하는 이미지면 스킵
            DELETE_LIST=()
            for img in "${ALL_SHA[@]}"; do
              if printf '%s\n' "${PROTECT_LIST[@]}" | grep -qx "$img"; then
                continue
              fi
              if printf '%s\n' "${IN_USE[@]}" | grep -qx "$img"; then
                continue
              fi
              DELETE_LIST+=("$img")
            done

            # 6) 삭제 실행
            # - docker rmi -f: 이미지를 강제 삭제 
            # - || true: 삭제 중 에러가 나도 스크립트가 중단되지 않게 함
            if [ "${#DELETE_LIST[@]}" -gt 0 ]; then
              echo "[cleanup] 6. 오래된 이미지를 ${#DELETE_LIST[@]}개 삭제합니다:"
              printf '  - %s\n' "${DELETE_LIST[@]}"
              for img in "${DELETE_LIST[@]}"; do
                sudo docker rmi -f "$img" || true
              done
            else
              echo "[cleanup] 6. 삭제할 이미지가 없습니다."
            fi

            # 7) 추가적인 정리 dangling 이미지 및 빌드 캐시 정리
            # -f: “Are you sure?” 물어보지 말고 바로 실행
            # || true: 실패해도 스크립트 중단 X
            echo "[cleanup] + 태그 없는 이미지를 정리합니다."
            sudo docker image prune -f || true
            # docker builder prune: Docker 빌드 캐시 정리
            # 빌드 속도 향상을 위해 남겨둔 중간 결과를 삭제
            # 이미지나 컨테이너엔 영향 없음  
            echo "[cleanup] + 빌드 캐시를 정리합니다."
            sudo docker builder prune -f || true

            echo "[cleanup] 완료되었습니다. 최근 ${KEEP_N}개 이미지만 유지 중입니다."

  #-------------/Cleanup-------------
