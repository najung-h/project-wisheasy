# ======================================================================
# 단일 워크플로: Lint → Build → Push → (EC2) Deploy
# - 트리거(on) 명시: push(dev), pull_request(dev)  ← (오류 원인 제거)
# ======================================================================

name: Full CI/CD - Lint, Build, Push, and Deploy (Nginx + Django + MySQL)

on:
  push:
    branches:
      - dev          # ← 필요한 브랜치로 교체 가능 (예: main)
  pull_request:
    branches:
      - dev          # ← PR에서도 린트/빌드가 돌도록 명시

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # ------------------------------------------------------------------
      # 코드 체크아웃
      #  - token: 기본 제공 토큰 사용 (github.token). secrets.GITHUB_TOKEN 사용 금지
      #  - ref: 이벤트별로 조건 지정 (PR: head_ref, PUSH: ref)
      # ------------------------------------------------------------------
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      # Python 3.11 (ruff 등 도구 실행용)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Ruff 설치
      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      # Ruff: check-only 모드 (자동수정/푸시 없음 → 루프 방지)
      #  - 위반사항이 있으면 non-zero로 실패 처리
      - name: Run Ruff (check-only; no auto-fix)
        if: ${{ github.actor != 'github-actions[bot]' }}   # 루프 방지 추가 안전장치
        run: |
          ruff check --diff .
          ruff format --check .

      # Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 빌드 & 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/najungh:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/najungh:sha-${{ github.sha }}

  deploy:
    needs: build-and-push
    # PR에서는 배포를 스킵하고, push(dev)일 때만 배포하려면 아래 if 추가
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 with Docker Compose (nginx + web + db)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/ubuntu/app"
            mkdir -p "$APP_DIR/nginx/conf.d"
            cd "$APP_DIR"

            # .env 재생성
            rm -f .env
            cat > .env << 'EOF'
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}

            DB_HOST=db
            DB_NAME=${{ secrets.MYSQL_DATABASE }}
            DB_USER=${{ secrets.MYSQL_USER }}
            DB_PASS=${{ secrets.MYSQL_PASSWORD }}
            DB_PORT=3306

            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DJANGO_DEBUG=false
            DJANGO_ALLOWED_HOSTS=*
            EOF

            # Docker/Compose 보장
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Install Docker CE first."; exit 1
            fi
            sudo systemctl enable --now docker
            sudo docker version || (echo "Docker daemon not running" && exit 1)

            if ! sudo docker compose version >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            fi

            # Hub 로그인
            if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            fi

            # 네트워크
            sudo docker network create appnet || true

            # nginx conf (HTTP→HTTPS 리다이렉트 + 프록시)
            cat > nginx/conf.d/default.conf << 'EOF'
            server {
              listen 80;
              server_name wisheasy.site;
              return 301 https://$host$request_uri;
            }

            server {
              listen 443 ssl http2;
              server_name wisheasy.site;

              ssl_certificate /etc/letsencrypt/live/wisheasy.site/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/wisheasy.site/privkey.pem;

              ssl_session_timeout 1d;
              ssl_session_cache shared:MozSSL:10m;
              ssl_session_tickets off;
              ssl_dhparam /etc/ssl/certs/dhparam.pem;

              add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

              location / {
                proxy_pass http://web:8000;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }

              location = /healthz {
                proxy_pass http://web:8000/healthz;
              }
            }
            EOF

            # compose 작성
            cat > docker-compose.prod.yml << 'EOF'
            services:
              db:
                image: mysql:8
                container_name: mysql_db
                restart: always
                env_file: .env
                volumes:
                  - mysql_data:/var/lib/mysql
                networks: [appnet]
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
                  interval: 5s
                  timeout: 3s
                  retries: 30

              web:
                image: ${DOCKERHUB_IMAGE}
                container_name: najungh_web
                restart: always
                env_file: .env
                networks: [appnet]
                depends_on:
                  db:
                    condition: service_healthy
                # 임시 주석 처리, 백엔드에서 /healthz 엔드포인트 구현 전까지 비활성화
                # healthcheck:
                #   test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz || exit 1"]
                #   interval: 10s
                #   timeout: 3s
                #   retries: 12

              nginx:
                image: nginx:1.27-alpine
                container_name: nginx_edge
                restart: always
                depends_on:
                  - web
                  # 임시 주석 처리, healthcheck 켜놓은 이후로 다시 해제 예정
                  # web:
                  #   condition: service_healthy
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./nginx/conf.d:/etc/nginx/conf.d:ro
                  - /etc/letsencrypt:/etc/letsencrypt:ro
                networks: [appnet]
                # 임시 주석 처리
                # healthcheck:
                #   test: ["CMD-SHELL", "curl -f http://localhost/healthz || exit 1"]
                #   interval: 10s
                #   timeout: 3s
                #   retries: 12

            networks:
              appnet:
                external: true

            volumes:
              mysql_data:
            EOF

            # 이미지 태그 지정(sha 권장)
            sudo DOCKERHUB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/najungh:sha-${{ github.sha }} docker compose -f docker-compose.prod.yml pull
            sudo DOCKERHUB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/najungh:sha-${{ github.sha }} docker compose -f docker-compose.prod.yml up -d
            sudo docker compose -f docker-compose.prod.yml ps

            # E2E 헬스체크 (HTTPS 경유)
            for i in {1..40}; do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" https://wisheasy.site/healthz || true)
              if [ "$CODE" = "200" ]; then
                echo "NGINX -> WEB health OK (HTTP 200)"; break
              fi
              echo "Waiting for stack to be ready... ($i)"; sleep 3
            done

            if [ "$CODE" != "200" ]; then
              echo "ERROR: stack health check failed"
              echo "==== nginx logs ===="; sudo docker logs nginx_edge --tail 200 || true
              echo "==== web logs ====";    sudo docker logs najungh_web --tail 200 || true
              echo "==== mysql logs ===="; sudo docker logs mysql_db --tail 200 || true
              exit 1
            fi
